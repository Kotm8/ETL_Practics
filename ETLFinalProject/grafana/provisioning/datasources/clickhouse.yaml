apiVersion: 1

datasources:
  - name: ClickHouse
    uid: clickhouse
    type: grafana-clickhouse-datasource
    access: proxy
    isDefault: true
    editable: true
    jsonData:
      host: $CLICKHOUSE_HOST
      port: $CLICKHOUSE_PORT
      protocol: http
      defaultDatabase: $CLICKHOUSE_DATABASE
      tlsSkipVerify: false
    secureJsonData:
      username: $CLICKHOUSE_USER
      password: $CLICKHOUSE_PASSWORD
